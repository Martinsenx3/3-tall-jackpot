openapi: 3.0.3
info:
  title: 3-TALL RGS API
  version: 1.0.0
  description: >
    Spillserver-API for 3-TALL. Alle beløp er heltall i øre (NOK).
    Pengeflyt mot operatørens lommebok beskrives i INTEGRATION.md —
    dette er API-et spillklienten bruker mot RGS-en.
servers:
  - url: https://three-tall-jackpot.onrender.com
  - url: http://localhost:8123
paths:
  /api/session:
    post:
      summary: Opprett spillsesjon
      description: I operator-modus verifiseres launch-token mot operatørens plattform. I mock-modus opprettes en demospiller med 1 000 kr.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string, description: Engangs launch-token fra operatørens plattform (påkrevd i operator-modus) }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessionId: { type: string, format: uuid }
                  mode: { type: string, enum: [mock, operator] }
                  player: { type: object, properties: { id: { type: string }, name: { type: string } } }
                  currency: { type: string, example: NOK }
                  balanceOre: { type: integer }
                  tickets:
                    type: array
                    items:
                      type: object
                      properties:
                        top: { type: array, items: { type: integer } }
                        mid: { type: array, items: { type: integer }, description: Payline — kun denne raden teller }
                        bottom: { type: array, items: { type: integer } }
                  config:
                    type: object
                    properties:
                      stakeOptionsOre: { type: array, items: { type: integer }, example: [200, 400, 800, 1600] }
                      multipliers: { type: object, properties: { two: { type: integer }, three: { type: integer }, jackpot: { type: integer } } }
                      intervalMs: { type: integer, example: 22000 }
                      betCutoffMs: { type: integer, example: 1500 }
                      rtpPct: { type: integer, example: 70, description: "Mål-utbetalingsprosent (RTP-verifikasjon hos akkreditert testhus utestående — se INTEGRATION.md)" }
                      numbersTotal: { type: integer, example: 20 }
                      drawsPerRound: { type: integer, example: 4 }
                      realityCheckMs: { type: integer, nullable: true }
                      limits: { type: object, properties: { dailyLossOre: { type: integer, nullable: true }, dailyDepositOre: { type: integer, nullable: true }, sessionTimeMs: { type: integer, nullable: true } } }
                      helpLine: { type: object, properties: { name: { type: string }, phone: { type: string }, url: { type: string } } }
                      ageLimit: { type: integer, example: 18 }
                      cooloffPresets: { type: array, items: { type: string }, example: ["15m", "1t", "24t", "7d"] }
                      rgEditable: { type: boolean, description: true i mock (spiller setter grenser i spillet), false i operator }
                      licence: { type: string }
                  rg: { $ref: "#/components/schemas/RgState" }
                  fair: { $ref: "#/components/schemas/Fair" }
                  jackpots: { $ref: "#/components/schemas/Jackpots" }
                  round: { $ref: "#/components/schemas/RoundInfo" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { description: "SELF_EXCLUDED / COOLOFF_ACTIVE / AGE_NOT_VERIFIED / JURISDICTION_BLOCKED (kun operator-modus)" }
  /api/tickets:
    post:
      summary: Generer nye bonger for sesjonen
      requestBody: { $ref: "#/components/requestBodies/SessionOnly" }
      responses:
        "200": { description: Nye bonger }
        "409": { description: BET_ACTIVE — aktivt kjøp må avbrytes først }
  /api/bet:
    post:
      summary: Kjøp neste runde
      description: >
        Debiterer operatør-lommeboken umiddelbart (txId `bet-{betId}`, idempotent).
        Avvises etter innsats-stenging (1,5 s før trekning). Ett kjøp per sesjon per runde.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [sessionId, stakeOre, active]
              properties:
                sessionId: { type: string }
                stakeOre: { type: integer, enum: [200, 400, 800, 1600] }
                active: { type: array, items: { type: integer, minimum: 0, maximum: 3 }, description: Hvilke bonger som spiller }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  betId: { type: string, format: uuid }
                  roundId: { type: integer }
                  amountOre: { type: integer }
                  balanceOre: { type: integer, nullable: true }
        "400": { description: INVALID_STAKE / INVALID_TICKETS }
        "402": { description: INSUFFICIENT_FUNDS }
        "403": { description: "Ansvarlig spill: LOSS_LIMIT_REACHED / TIME_LIMIT_REACHED / COOLOFF_ACTIVE / SELF_EXCLUDED (ingen transaksjon opprettes)" }
        "409": { description: WINDOW_CLOSED / ALREADY_BET / STAKE_LIMIT }
  /api/bet/cancel:
    post:
      summary: Avbryt kjøp (full refusjon) før vinduet stenger
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [sessionId, betId]
              properties:
                sessionId: { type: string }
                betId: { type: string }
      responses:
        "200": { description: Tilbakeført (txId `rb-bet-{betId}`) }
        "404": { description: NO_BET }
        "409": { description: WINDOW_CLOSED — innsatsen står }
  /api/state:
    get:
      summary: Sesjonstilstand (saldo, aktivt kjøp, siste resultat, jackpotter, rundetiming)
      parameters:
        - in: query
          name: sessionId
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  balanceOre: { type: integer, nullable: true }
                  bet:
                    type: object
                    nullable: true
                    properties:
                      betId: { type: string }
                      roundId: { type: integer }
                      stakeOre: { type: integer }
                      active: { type: array, items: { type: integer } }
                  lastResult:
                    type: object
                    nullable: true
                    properties:
                      roundId: { type: integer }
                      winOre: { type: integer }
                      breakdown:
                        type: array
                        items:
                          type: object
                          properties:
                            bong: { type: integer }
                            type: { type: string, enum: [2-rette, 3-rette, jackpot] }
                            amountOre: { type: integer }
                  rg: { $ref: "#/components/schemas/RgState" }
                  jackpots: { $ref: "#/components/schemas/Jackpots" }
                  round: { $ref: "#/components/schemas/RoundInfo" }
  /api/verify:
    get:
      summary: Bevisbar rettferdig — avslørt frø + tall for en trukket runde
      description: Offentlig, read-only. Returnerer kun ALLEREDE trukne runder (aldri et ventende frø). Klienten reberegner og bekrefter mot den forhåndspubliserte forpliktelsen.
      parameters:
        - { in: query, name: round, required: true, schema: { type: integer } }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  round: { type: integer }
                  version: { type: integer }
                  clientSeed: { type: string }
                  publicInput: { type: string, description: "version:clientSeed:round — input til HMAC" }
                  serverSeed: { type: string, description: Avslørt frø (hex) }
                  commit: { type: string, description: sha256(serverSeed) publisert på forhånd }
                  numbers: { type: array, items: { type: integer } }
                  at: { type: integer, description: epoch ms }
        "400": { description: INVALID_ROUND }
        "404": { description: NO_ROUND (ukjent eller for gammel) }
  /api/history:
    get:
      summary: Transaksjonshistorikk for sesjonen (read-only)
      description: Projeksjon av oppgjorte runder for KALLENDE sesjon. Begrenset til siste KEEP_ROUNDS i minnet — operatørens kontoutskrift er fasit.
      parameters:
        - { in: query, name: sessionId, required: true, schema: { type: string } }
        - { in: query, name: limit, required: false, schema: { type: integer, minimum: 1, maximum: 30 } }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        roundId: { type: integer }
                        at: { type: integer, nullable: true }
                        drawn: { type: array, items: { type: integer }, nullable: true }
                        stakeOre: { type: integer }
                        bongs: { type: integer }
                        betAmountOre: { type: integer }
                        winOre: { type: integer }
                        netOre: { type: integer }
                  returnedThrough: { type: integer }
                  keptRounds: { type: integer }
        "401": { $ref: "#/components/responses/Error" }
  /api/rg/cooloff:
    post:
      summary: Ta en pause / selvutesteng (KUN mock-modus)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [sessionId, preset]
              properties:
                sessionId: { type: string }
                preset: { type: string, enum: ["15m", "1t", "24t", "7d", "exclude"] }
      responses:
        "200": { description: "{exclusion, helpLine}" }
        "400": { description: INVALID_PRESET }
        "409": { description: OPERATOR_MANAGED — settes hos operatøren i operator-modus }
  /api/rg/limits:
    post:
      summary: Sett ansvarlig-spill-grenser (KUN mock-modus)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [sessionId]
              properties:
                sessionId: { type: string }
                dailyLossOre: { type: integer, nullable: true, minimum: 0 }
                dailyDepositOre: { type: integer, nullable: true, minimum: 0 }
                sessionTimeMs: { type: integer, nullable: true, minimum: 0 }
      responses:
        "200": { description: "{limits, lossSoFarOre}" }
        "400": { description: INVALID_LIMIT }
        "409": { description: OPERATOR_MANAGED i operator-modus }
  /api/topup:
    post:
      summary: Demo-påfyll (KUN mock-modus)
      requestBody: { $ref: "#/components/requestBodies/SessionOnly" }
      responses:
        "200": { description: Ny saldo }
        "403": { description: NOT_AVAILABLE i operator-modus }
  /api/bonus:
    post:
      summary: Daglig bonus (KUN mock-modus)
      requestBody: { $ref: "#/components/requestBodies/SessionOnly" }
      responses:
        "200": { description: "{balanceOre, amountOre}" }
        "403": { description: NOT_AVAILABLE i operator-modus }
        "409": { description: ALREADY_CLAIMED i denne sesjonen }
  /events:
    get:
      summary: SSE-strøm av den felles trekningen
      description: >
        `event: hello` ved tilkobling {round, msToNext, intervalMs, jackpots, fair};
        `event: round` per trekning {n, numbers[4], intervalMs, jackpots, fair};
        `event: players` {players}; `event: results` (anonymisert vinnerfeed).
        `fair` bærer forpliktelse for neste runde + avsløring av forrige (commit–reveal).
        Keepalive-ping hvert 20. sekund.
      responses:
        "200": { description: text/event-stream }
components:
  requestBodies:
    SessionOnly:
      content:
        application/json:
          schema:
            type: object
            required: [sessionId]
            properties:
              sessionId: { type: string }
  schemas:
    Jackpots:
      type: object
      description: Felles progressive potter i øre, per innsatsnivå
      properties:
        low: { type: integer, description: "Nivå 2–4 kr" }
        high: { type: integer, description: "Nivå 8–16 kr" }
    RoundInfo:
      type: object
      properties:
        n: { type: integer, description: Sist trukne runde }
        next: { type: integer, description: Runden kjøp gjelder }
        msToNext: { type: integer }
        bettingOpen: { type: boolean }
    RgState:
      type: object
      nullable: true
      description: Ansvarlig-spill-tilstand for sesjonen (operatøreid i produksjon)
      properties:
        sessionStartedAt: { type: integer, description: epoch ms }
        sessionElapsedMs: { type: integer }
        lossSoFarOre: { type: integer }
        limits: { type: object, properties: { dailyLossOre: { type: integer, nullable: true }, dailyDepositOre: { type: integer, nullable: true }, sessionTimeMs: { type: integer, nullable: true } } }
        exclusion: { type: object, properties: { status: { type: string, enum: [none, cooloff, excluded] }, until: { type: integer, nullable: true } } }
        realityCheckMs: { type: integer, nullable: true }
    Fair:
      type: object
      description: Bevisbar rettferdig (commit–reveal)
      properties:
        version: { type: integer }
        clientSeed: { type: string }
        commit: { type: object, properties: { round: { type: integer }, commit: { type: string, description: sha256(serverSeed) for neste runde } } }
        reveal:
          type: object
          nullable: true
          properties:
            round: { type: integer }
            serverSeed: { type: string }
            commit: { type: string }
  responses:
    Error:
      description: Feil
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string }
              message: { type: string }
